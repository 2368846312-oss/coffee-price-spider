name: Coffee Price Daily Fetch

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download previous data
        uses: actions/download-artifact@v4
        with:
          name: coffee-price
        continue-on-error: true

      - name: Install dependencies
        run: pip install curl_cffi openpyxl beautifulsoup4 lxml requests yfinance pandas

      - name: Run fetch script
        run: python fetch_coffee_price.py

      - uses: actions/upload-artifact@v4
        with:
          name: coffee-price
          path: coffee_price_history.xlsx
          retention-days: 90

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add coffee_price_history.xlsx
          git diff --staged --quiet || git commit -m "Update coffee price data [skip ci]"
          git push


