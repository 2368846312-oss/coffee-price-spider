name: Daily Coffee Data

on:
  schedule:
    # 每天北京时间 16:00 = UTC 08:00
    - cron: "0 8 * * *"
  workflow_dispatch:  # 允许手动触发

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Chrome & Chromedriver
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install requests xlrd openpyxl selenium

      - name: Run coffee_scraper (咖啡豆每日价格)
        run: python coffee_scraper.py

      - name: Run fetch_coffee_stocks (ICE咖啡认证库存)
        run: python fetch_coffee_stocks.py

      - name: Commit and push updated Excel files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add *.xlsx
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto update: $(date +'%Y-%m-%d') coffee data"
            git push
          fi
